spring:
  application:
    name: sequence-forge

  datasource:
    url: jdbc:postgresql://localhost:5432/sequenceforge
    username: sequenceforge
    password: sequenceforge
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: "${GOOGLE_CLIENT_ID:change-me}"
            client-secret: "${GOOGLE_CLIENT_SECRET:change-me}"
            scope: openid,email,profile
            redirect-uri: "${OAUTH2_REDIRECT_BASE:http://localhost:5173}/login/oauth2/code/{registrationId}"
          github:
            client-id: "${GITHUB_CLIENT_ID:change-me}"
            client-secret: "${GITHUB_CLIENT_SECRET:change-me}"
            scope: read:user,user:email

  threads:
    virtual:
      enabled: true

  # Redis Sentinel (production HA) — uncomment and set SENTINEL_NODES env var to enable.
  # When enabled, overrides spring.data.redis.host/port above.
  # data:
  #   redis:
  #     sentinel:
  #       master: sequenceforge-master
  #       nodes: "${SENTINEL_NODES:sentinel1:26379,sentinel2:26379,sentinel3:26379}"
  #       password: "${REDIS_PASSWORD:}"

server:
  port: 8080

anthropic:
  # Set ANTHROPIC_API_KEY env var. Get a key at https://console.anthropic.com
  api-key: "${ANTHROPIC_API_KEY:}"

app:
  ai:
    enabled: "${AI_ENABLED:false}"   # Set AI_ENABLED=false or app.ai.enabled=false to disable AI endpoints

  dev-login:
    enabled: true   # Set to false in production

  jwt:
    # WARNING: Override APP_JWT_SECRET in production. Generate with: openssl rand -base64 32
    secret: "${APP_JWT_SECRET:c2VxdWVuY2UtZm9yZ2UtZGV2LXNlY3JldC1rZXktbG9jYWwtb25seQ==}"
    expiration-ms: 86400000  # 24 hours
  auth:
    # Defaults to Vite dev server login route for local development
    frontend-redirect-url: "${FRONTEND_URL:http://localhost:5173/login}"

resilience4j:
  circuitbreaker:
    instances:
      redis-counter:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        slowCallRateThreshold: 80
        slowCallDurationThreshold: 2s
        eventConsumerBufferSize: 20

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    io.sequenceforge: DEBUG
    org.springframework.security: INFO
    org.springframework.data.redis: INFO
